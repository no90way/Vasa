name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Create www folder
        run: mkdir www && cp index.html www/
      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4
      - name: Setup config
        run: |
          echo '{"appId":"com.vasa.app","appName":"Vasa","webDir":"www"}' > capacitor.config.json
      - name: Add Android
        run: npx cap add android && npx cap sync android
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vasa-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
